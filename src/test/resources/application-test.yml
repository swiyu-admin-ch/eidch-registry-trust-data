spring:
  datasource:
    # using testcontainer
    #url: 'jdbc:postgresql://localhost:5390/trust-registry-db'
    username: postgres
    password: secret
    driverClassName: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: data
  sql:
    init:
      mode: always
  flyway:
    enabled: true
    default-schema: ${spring.jpa.properties.hibernate.default_schema}
    locations:
      - classpath:db/migration/common

  main:
    allow-circular-references: true

features:
  EIDARTFE_671_672_TRUST_PROTOCOL: true
  EIDARTFE_754_VC_SCHEMA: true
  EIDARTFE_1129_NON_COMPLIANT_ACTORS: true