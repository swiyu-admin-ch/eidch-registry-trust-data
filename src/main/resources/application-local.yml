server:
  port: 8390 # dedicated within swiyu to avoid conflicts

jeap:
  monitor:
    prometheus:
      password: "{noop}prometheus"
      user: "prometheus"

spring:
  sql:
    init:
      schema-locations: classpath:init-schema-for-local-startup.sql
      mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "jdbc:postgresql://localhost:5390/trust-registry-db"
    username: "postgres"
    password: "secret"
  jpa:
    properties:
      hibernate:
        hbm2ddl.auto: update

  docker:
    compose:
      enabled: true
      file: compose.yml

logging:
  level:
    ch.admin.bit.jeap: DEBUG
    ch.admin.bj.swiyu: DEBUG
    org.springframework.web: DEBUG

features:
  EIDARTFE_671_672_TRUST_PROTOCOL: true
  EIDARTFE_754_VC_SCHEMA: true
  EIDARTFE_1129_NON_COMPLIANT_ACTORS: true